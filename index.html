<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Sunny Pond 🐸</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #F7F3EF;
      color: #444;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 32px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 8px;
    }

    .safe {
      text-align: center;
      color: #5c5c5c;
      font-size: 15px;
      margin-bottom: 22px;
    }

    .menu-button {
      display: block;
      width: 100%;
      padding: 16px 18px;
      margin-bottom: 12px;
      border: none;
      border-radius: 18px;
      background: #A8BFA3;
      color: white;
      font-size: 17px;
      cursor: pointer;
    }

    .menu-button:last-child {
      margin-bottom: 0;
    }

    .footer {
      text-align: center;
      color: #777;
      font-size: 14px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>The Sunny Pond 🐸</h1>
      <p class="subtitle">a soft, safe little place to land</p>
      <p class="safe">you’re safe here, you can take this slowly</p>

      <button class="menu-button">🌿 Reset</button>
      <button class="menu-button">✨ Dopamine</button>
      <button class="menu-button">📖 Journal</button>
      <button class="menu-button">🛌 Low Energy</button>
    </div>

    <p class="footer">small still counts ☀️</p>
  </div>
</body>
</html>
