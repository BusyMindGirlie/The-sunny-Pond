<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Sunny Pond 🐸</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #F7F3EF;
      color: #444;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 26px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 8px;
    }

    .safe {
      text-align: center;
      color: #5c5c5c;
      font-size: 15px;
      margin-bottom: 22px;
    }

    .menu-button {
      display: block;
      width: 100%;
      padding: 14px;
      margin-bottom: 10px;
      border: none;
      border-radius: 18px;
      background: #A8BFA3;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    .menu-button.selected {
      background: #7F9C78;
    }

    .back-button {
      background: #ddd;
      color: #333;
    }

    textarea {
      width: 100%;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid #ddd;
      margin-top: 10px;
    }

    .entry {
      background: #FAF8F6;
      padding: 12px;
      border-radius: 12px;
      margin-top: 10px;
    }

    .footer {
      text-align: center;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>

<body>
<div class="app">

  <!-- HOME -->
  <div id="home">
    <div class="card">
      <h1>The Sunny Pond 🐸</h1>
      <p class="subtitle">a soft, safe little place to land</p>
      <p class="safe">you’re safe here, you can take this slowly</p>

      <button class="menu-button" onclick="showScreen('reset')">🌿 Reset</button>
      <button class="menu-button" onclick="showScreen('dopamine')">✨ Dopamine</button>
      <button class="menu-button">📖 Journal</button>
      <button class="menu-button">🛌 Low Energy</button>
    </div>

    <p class="footer">small still counts ☀️</p>
  </div>

  <!-- RESET -->
  <div id="reset" style="display:none;">
    <button class="menu-button back-button" onclick="showScreen('home')">← Back</button>

    <div class="card">
      <h1>Reset 🌿</h1>

      <button class="menu-button" onclick="setEnergy('Low energy')">Low energy</button>
      <button class="menu-button" onclick="setEnergy('Okay')">Okay</button>
      <button class="menu-button" onclick="setEnergy('High energy')">High energy</button>
    </div>

    <div class="card">
      <textarea id="selfcare" placeholder="what did you do for yourself?"></textarea>
      <button class="menu-button" onclick="saveEntry()">Save today 🐸</button>
    </div>

    <div class="card">
      <div id="entries"></div>
    </div>
  </div>

  <!-- DOPAMINE -->
  <div id="dopamine" style="display:none;">
    <button class="menu-button back-button" onclick="showScreen('home')">← Back</button>

    <div class="card">
      <h1>What do you need right now?</h1>

      <button class="menu-button" onclick="showSuggestions('overwhelmed', this)">🌫️ I feel overwhelmed</button>
      <button class="menu-button" onclick="showSuggestions('low', this)">💤 I feel low energy</button>
      <button class="menu-button" onclick="showSuggestions('restless', this)">⚡ I feel restless</button>
      <button class="menu-button" onclick="showSuggestions('heavy', this)">💔 I feel heavy</button>
      <button class="menu-button" onclick="showSuggestions('reset', this)">🌿 I just need a reset</button>
    </div>

    <div class="card">
      <div id="suggestions"></div>
    </div>
  </div>

</div>

<script>
let selectedEnergy = "";

function showScreen(screen) {
  document.getElementById("home").style.display = "none";
  document.getElementById("reset").style.display = "none";
  document.getElementById("dopamine").style.display = "none";

  document.getElementById(screen).style.display = "block";
}

function setEnergy(e) {
  selectedEnergy = e;
}

function saveEntry() {
  const text = document.getElementById("selfcare").value;

  const entry = {
    date: new Date().toLocaleDateString(),
    energy: selectedEnergy,
    text: text
  };

  const entries = JSON.parse(localStorage.getItem("pond") || "[]");
  entries.unshift(entry);
  localStorage.setItem("pond", JSON.stringify(entries));

  document.getElementById("selfcare").value = "";
  displayEntries();
}

function displayEntries() {
  const entries = JSON.parse(localStorage.getItem("pond") || "[]");
  const container = document.getElementById("entries");
  container.innerHTML = "";

  entries.forEach(e => {
    const div = document.createElement("div");
    div.className = "entry";
    div.innerHTML = "<b>" + e.date + "</b><br>" + e.energy + "<br>" + e.text;
    container.appendChild(div);
  });
}

function showSuggestions(type, button) {
  const container = document.getElementById("suggestions");

  const buttons = button.parentElement.querySelectorAll(".menu-button");
  buttons.forEach(b => b.classList.remove("selected"));
  button.classList.add("selected");

  let list = [];

  if (type === "overwhelmed") {
    list = ["🤍 breathe slowly", "✍️ brain dump", "🛏️ lie down", "🐸 you’re safe"];
  }

  if (type === "low") {
    list = ["🫖 warm drink", "🪟 open window", "🛏️ rest", "🎧 soft music"];
  }

  if (type === "restless") {
    list = ["🚶‍♀️ short walk", "🎶 upbeat song", "🧍‍♀️ stretch", "🌿 step outside"];
  }

  if (type === "heavy") {
    list = ["🫂 comfort yourself", "🎮 gentle game", "🤍 sit with it", "🛏️ lie down"];
  }

  if (type === "reset") {
    list = ["🚿 warm shower", "☀️ sunlight", "🧘‍♀️ stretch", "🔥 heat pack"];
  }

  container.innerHTML = "";
  list.forEach(item => {
    const div = document.createElement("div");
    div.className = "entry";
    div.innerText = item;
    container.appendChild(div);
  });
}

displayEntries();
</script>

</body>
</html>
