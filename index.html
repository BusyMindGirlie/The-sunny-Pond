<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Sunny Pond 🐸</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #F7F3EF;
      color: #444;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 8px;
    }

    .safe {
      text-align: center;
      color: #5c5c5c;
      font-size: 15px;
      margin-bottom: 22px;
    }

    .menu-button {
      display: block;
      width: 100%;
      padding: 16px;
      margin-bottom: 12px;
      border: none;
      border-radius: 18px;
      background: #A8BFA3;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .back-button {
      background: #ddd;
      color: #333;
    }

    textarea {
      width: 100%;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid #ddd;
      margin-top: 10px;
    }

    .footer {
      text-align: center;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>

<body>
<div class="app">

  <!-- HOME -->
  <div id="home">
    <div class="card">
      <h1>The Sunny Pond 🐸</h1>
      <p class="subtitle">a soft, safe little place to land</p>
      <p class="safe">you’re safe here, you can take this slowly</p>

      <button class="menu-button" onclick="showScreen('reset')">🌿 Reset</button>
      <button class="menu-button">✨ Dopamine</button>
      <button class="menu-button">📖 Journal</button>
      <button class="menu-button">🛌 Low Energy</button>
    </div>

    <p class="footer">small still counts ☀️</p>
  </div>

  <!-- RESET -->
  <div id="reset" style="display:none;">
    <button class="menu-button back-button" onclick="showScreen('home')">← Back</button>

    <div class="card">
      <h1>Reset 🌿</h1>
      <p>How are you feeling today?</p>

      <button class="menu-button" onclick="setEnergy('Low energy')">Low energy</button>
      <button class="menu-button" onclick="setEnergy('Foggy')">Foggy</button>
      <button class="menu-button" onclick="setEnergy('Okay')">Okay</button>
    </div>

    <div class="card">
      <p>What did you do for yourself today?</p>
      <textarea id="selfcare"></textarea>
    </div>
  </div>

</div>

<script>
function showScreen(screen) {
  document.getElementById("home").style.display = "none";
  document.getElementById("reset").style.display = "none";

  document.getElementById(screen).style.display = "block";
}

function setEnergy(e) {
  alert("You selected: " + e);
}
</script>

</body>
</html>
