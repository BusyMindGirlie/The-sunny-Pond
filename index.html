<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Sunny Pond 🐸</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #F7F3EF;
      color: #444;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 8px;
    }

    .safe {
      text-align: center;
      color: #5c5c5c;
      font-size: 15px;
      margin-bottom: 22px;
    }

    .menu-button {
      display: block;
      width: 100%;
      padding: 16px;
      margin-bottom: 12px;
      border: none;
      border-radius: 18px;
      background: #A8BFA3;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .menu-button:hover {
      opacity: 0.95;
    }

    .back-button {
      background: #ddd;
      color: #333;
    }

    .energy-button.selected {
      background: #7F9C78;
    }

    textarea {
      width: 100%;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid #ddd;
      margin-top: 10px;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      font-size: 15px;
    }

    .footer {
      text-align: center;
      color: #777;
      font-size: 14px;
    }

    .entry {
      background: #FAF8F6;
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
      border: 1px solid #eee;
    }

    .entry-date {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .entry-energy {
      color: #666;
      margin-bottom: 6px;
    }

    .save-button {
      background: #A8BFA3;
    }
  </style>
</head>

<body>
<div class="app">

  <!-- HOME -->
  <div id="home">
    <div class="card">
      <h1>The Sunny Pond 🐸</h1>
      <p class="subtitle">a soft, safe little place to land</p>
      <p class="safe">you’re safe here, you can take this slowly</p>

      <button class="menu-button" onclick="showScreen('reset')">🌿 Reset</button>
      <button class="menu-button">✨ Dopamine</button>
      <button class="menu-button">📖 Journal</button>
      <button class="menu-button">🛌 Low Energy</button>
    </div>

    <p class="footer">small still counts ☀️</p>
  </div>

  <!-- RESET -->
  <div id="reset" style="display:none;">
    <button class="menu-button back-button" onclick="showScreen('home')">← Back</button>

    <div class="card">
      <h1>Reset 🌿</h1>
      <p>How are you feeling today?</p>

      <button class="menu-button energy-button" id="energy-low" onclick="setEnergy('Low energy', 'energy-low')">Low energy</button>
      <button class="menu-button energy-button" id="energy-foggy" onclick="setEnergy('Foggy', 'energy-foggy')">Foggy</button>
      <button class="menu-button energy-button" id="energy-okay" onclick="setEnergy('Okay', 'energy-okay')">Okay</button>
    </div>

    <div class="card">
      <p>What did you do for yourself today?</p>
      <textarea id="selfcare" rows="4" placeholder="Even something small counts…"></textarea>
      <button class="menu-button save-button" onclick="saveEntry()">Save today 🐸</button>
    </div>

    <div class="card">
      <p><strong>Previous entries</strong></p>
      <div id="entries"></div>
    </div>
  </div>

</div>

<script>
let selectedEnergy = "";

function showScreen(screen) {
  document.getElementById("home").style.display = "none";
  document.getElementById("reset").style.display = "none";

  document.getElementById(screen).style.display = "block";
}

function setEnergy(energy, buttonId) {
  selectedEnergy = energy;

  const buttons = document.querySelectorAll(".energy-button");
  buttons.forEach(button => button.classList.remove("selected"));

  document.getElementById(buttonId).classList.add("selected");
}

function saveEntry() {
  const text = document.getElementById("selfcare").value.trim();

  if (!selectedEnergy && !text) {
    alert("Add a feeling or a little note first 💛");
    return;
  }

  const entry = {
    date: new Date().toLocaleDateString(),
    energy: selectedEnergy,
    text: text
  };

  const entries = JSON.parse(localStorage.getItem("sunnyPondEntries") || "[]");
  entries.unshift(entry);
  localStorage.setItem("sunnyPondEntries", JSON.stringify(entries));

  document.getElementById("selfcare").value = "";
  selectedEnergy = "";

  const buttons = document.querySelectorAll(".energy-button");
  buttons.forEach(button => button.classList.remove("selected"));

  displayEntries();
}

function displayEntries() {
  const entries = JSON.parse(localStorage.getItem("sunnyPondEntries") || "[]");
  const container = document.getElementById("entries");
  container.innerHTML = "";

  if (entries.length === 0) {
    container.innerHTML = "<p style='color:#777;'>No entries yet 🌿</p>";
    return;
  }

  entries.forEach(entry => {
    const div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <div class="entry-date">${entry.date}</div>
      <div class="entry-energy">${entry.energy ? "Feeling: " + entry.energy : ""}</div>
      <div>${entry.text ? entry.text : ""}</div>
    `;

    container.appendChild(div);
  });
}

displayEntries();
</script>

</body>
</html>
